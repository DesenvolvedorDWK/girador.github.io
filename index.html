<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Girador Ferroviário - 000 331</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
}

header{
    background:#00509E;
    color:white;
    text-align:center;
    padding:20px;
    position:sticky;
    top:0;
    z-index:100;
}

header h1{
    font-size:1.4rem;
}

.galeria{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
    gap:20px;
}

.imagem{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.imagem img{
    width:100%;
    height:auto;
    display:block;
}

.descricao{
    padding:12px;
    text-align:center;
    font-weight:bold;
    color:#333;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
    font-size:0.9rem;
}
    .creditos{
    text-align:center;
    color:#555;
    font-size:14px;
    line-height:1.5;
    }

</style>
</head>

<body>

<header>
    <h1>Girador Ferroviário - 000 331</h1>
</header>

<div class="galeria">

    <div class="imagem">
        <img src="000 331.PNG" alt="Vista Geral">
        <div class="descricao">Vista Geral</div>
    </div>

    <div class="imagem">
        <img src="000 331 - 100.jpeg" alt="Imagem 100">
        <div class="descricao">Imagem 100</div>
    </div>

    <div class="imagem">
        <img src="000 331 - 800 - 1.jpeg" alt="Imagem 800-1">
        <div class="descricao">Imagem 800-1</div>
    </div>

    <div class="imagem">
        <img src="000 331 - 800 - 2.jpeg" alt="Imagem 800-2">
        <div class="descricao">Imagem 800-2</div>
    </div>

    <div class="imagem">
        <img src="000 331 - 810.jpeg" alt="Imagem 810">
        <div class="descricao">Imagem 810</div>
    </div>

</div>

<footer>
    <div class="creditos">
        Desenvolvido por<br>
        <strong>David W. King</strong>
    </div>
</footer>

</body>
</html>
